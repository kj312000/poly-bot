global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    app: polymarket-trader

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - alerting-rules.yml

scrape_configs:
  - job_name: polymarket-trader
    static_configs:
      # host.docker.internal resolves to the host machine on Docker Desktop (Mac/Windows)
      # On Linux: replace with your host IP or use network_mode: host
      - targets:
          - host.docker.internal:9091
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
