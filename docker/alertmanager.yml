global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 15m

receivers:
  - name: 'default'
    # Add your notification integrations here (Slack, PagerDuty, email, etc.)
    # Example Slack webhook:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#trading-alerts'
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'

  - name: 'critical'
    # Higher-urgency notifications for critical alerts
    # webhook_configs:
    #   - url: 'http://your-alerting-endpoint/alert'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
